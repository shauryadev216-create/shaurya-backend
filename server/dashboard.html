<!DOCTYPE html>
<html>
<head>
<title>My Downloads</title>

<link rel="stylesheet" href="public/css/Style.css">

<style>

.dashboard{
    max-width:1100px;
    margin:80px auto;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:25px;
}

.card{
    border:1px solid #eee;
    border-radius:12px;
    padding:15px;
    background:#fff;
}

.card img{
    width:100%;
    border-radius:8px;
    margin-bottom:10px;
}

.card h3{
    font-size:16px;
    margin-bottom:6px;
}

.download-btn{
    width:100%;
    padding:12px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.empty{
    text-align:center;
    margin-top:100px;
    color:#666;
}

</style>
</head>

<body>

<div class="dashboard">

<h2>My Downloads</h2>

<div id="grid" class="grid"></div>

<p id="empty" class="empty" style="display:none;">
No purchases yet
</p>

</div>

<script src="public/js/dashboard.js" type="module"></script>

</body>
</html>
