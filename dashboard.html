<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
}

.container{
    max-width:900px;
    margin:50px auto;
}

.card{
    background:#fff;
    padding:15px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    gap:15px;
    border-radius:8px;
}

.card img{
    width:100px;
    height:70px;
    object-fit:cover;
}

.download-btn{
    margin-left:auto;
    padding:8px 14px;
    background:#111;
    color:#fff;
    border:none;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Your Purchases</h2>

<input id="emailInput" placeholder="Enter your email">
<button onclick="loadPurchases()">Load</button>

<div id="purchaseList"></div>

</div>

<script src="dashboard.js"></script>

<script>
// 🔥 AUTO FILL EMAIL
const saved = localStorage.getItem("userEmail");

if(saved){
    document.getElementById("emailInput").value = saved;
    loadPurchases();
}
</script>

</body>
</html>
