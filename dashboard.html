body {
    font-family: 'Inter', sans-serif;
    background: #f5f5f5;
}

.container {
    max-width: 900px;
    margin: 60px auto;
}

h1 {
    font-size: 28px;
    margin-bottom: 20px;
}

.search-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 30px;
}

.search-bar input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.search-bar button {
    padding: 12px 20px;
    border: none;
    background: #111;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

.card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.05);
}

.card img {
    width: 80px;
    height: 60px;
    object-fit: cover;
    border-radius: 8px;
}

.info {
    flex: 1;
    margin-left: 15px;
}

.title {
    font-weight: 600;
}

.price {
    font-size: 14px;
    color: #666;
}

.download-btn {
    padding: 10px 16px;
    border: none;
    background: linear-gradient(135deg,#111,#333);
    color: white;
    border-radius: 8px;
    cursor: pointer;
}
