<!DOCTYPE html>
<html>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<head>
    <script src="https://sdk.cashfree.com/js/v3/cashfree.js"></script>
<title>Checkout</title>

<style>

body{
    background:#f5f5f5;
    font-family:Arial;
}

.checkout{
    max-width:700px;
    margin:80px auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    border:1px solid #eee;
}

.product{
    display:flex;
    gap:15px;
    margin-bottom:20px;
}

.product img{
    width:120px;
    border-radius:8px;
}

.summary{
    margin-top:20px;
    padding-top:15px;
    border-top:1px solid #eee;
}

.pay-btn{
    width:100%;
    padding:16px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:20px;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="checkout">

<h2>Checkout</h2>

<div class="product">
    <img id="productImage">
    <div>
        <h3 id="title"></h3>
        <p id="price"></p>
    </div>
</div>

<p>Quantity: <b id="qty"></b></p>

<div class="summary">
    <h3>Total: <span id="total"></span></h3>
</div>

<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">

<button id="payBtn" class="pay-btn" onclick="payNow()">
    Proceed to Payment
</button>

</div>

<script src="public/js/checkout.js"></script>

</body>
</html>
