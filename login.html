<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:#f5f7fb;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#fff;
    padding:40px;
    border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

h1{
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:#777;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#3b82f6;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}

.google-btn{
    background:#fff;
    color:#333;
    border:1px solid #ddd;
}

</style>
</head>

<body>

<div class="container">

    <p>Please enter your details</p>
    <h1>Welcome back</h1>

    <input id="email" placeholder="Email address">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Sign in</button>

    <button class="google-btn" onclick="googleLogin()">
        Sign in with Google
    </button>

</div>

<script type="module" src="/public/js/login.js"></script>

</body>
</html>
