<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<link rel="stylesheet" href="public/css/Style.css">

<style>
.product-container{
    max-width: 1100px;
    margin: 60px auto;
    padding: 20px;
}

.product-image img{
    width: 100%;
    height: 500px;
    object-fit: cover;
    cursor: pointer;
}

.product-info{
    margin-top: 30px;
}

.product-buy{
    margin-top: 20px;
}

.buy-btn{
    margin-top: 15px;
    padding: 14px 24px;
    background:#111;
    color:#fff;
    border:none;
    cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.lightbox img{
    max-width: 90%;
    max-height: 90%;
}

.lightbox.active{
    display: flex;
}
</style>

</head>

<body>

<div class="product-container">

    <div class="product-image">
        <img id="mainImage">
    </div>

    <div class="product-info">
       

        <div class="product-buy">
            <span id="price"></span><br>
            <button id="buyBtn" class="but-btn">Buy Now</button>
        </div>
    </div>

    <h1 id="title"></h1>
    <p id="description"></p>

</div>

<div class="lightbox" id="lightbox">
    <img id="lightboxImg">
</div>

<script src="/public/js/product-detail-v2.js"></script>

</body>
</html>
