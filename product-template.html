<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link rel="stylesheet" href="public/css/Style.css">

<style>

/* ===== PRODUCT LAYOUT ===== */
.product-container{
    max-width: 1200px;
    margin: 80px auto;
    padding: 0 10%;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 60px;
    align-items: start;
}

/* IMAGE */
.product-image img{
    width: 100%;
    border-radius: 6px;
    object-fit: cover;
    aspect-ratio: 16/9;
    cursor: pointer;
}

/* INFO SIDE */
.product-info{
    display: flex;
    flex-direction: column;
}

/* TITLE */
#title{
    font-size: 32px;
    margin-bottom: 12px;
}

/* DESC */
#description{
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 25px;
}

/* PRICE */
#price{
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 20px;
}

/* INPUTS */
.product-buy input{
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 14px;
    transition: 0.25s;
}

.product-buy input:focus{
    border-color: #111;
    outline: none;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.08);
}

/* BUTTON */
.buy-btn{
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #111, #333);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.buy-btn:hover{
    transform: translateY(-2px);
}

/* LIGHTBOX */
.lightbox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.lightbox img{
    max-width: 90%;
    max-height: 90%;
}

.lightbox.active{
    display: flex;
}

/* RESPONSIVE */
@media(max-width: 900px){
    .product-container{
        grid-template-columns: 1fr;
    }
}

.preview-row{
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.preview-row img{
    width: 80px;
    height: 60px;
    object-fit: cover;
    cursor: pointer;
    border-radius: 6px;
    opacity: 0.7;
    transition: 0.3s;
}

.preview-row img:hover{
    opacity: 1;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">MINDLENS</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
    </div>
</nav>

<!-- PRODUCT -->
<div class="product-container">

    <!-- LEFT IMAGE -->
    <div class="product-image">
    <img id="mainImage">

    <div id="previewRow" class="preview-row"></div>
</div>

    <!-- RIGHT INFO -->
    <div class="product-info">

        <h1 id="title"></h1>
        <p id="description"></p>

        <div id="price"></div>

        <div class="product-buy">
            <input id="userPhone" placeholder="Enter Phone Number">
            <input id="userEmail" placeholder="Enter Email">
            <button id="buyBtn" class="buy-btn">Buy Now</button>
        </div>

    </div>

</div>
