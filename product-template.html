<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<link rel="stylesheet" href="public/css/Style.css">

<style>

.product-container{
    max-width: 1200px;
    margin: 80px auto;
    padding: 0 10%;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 60px;
}

.product-image img{
    width: 100%;
    border-radius: 6px;
    object-fit: cover;
    aspect-ratio: 16/9;
}

#title{
    font-size: 32px;
    margin-bottom: 12px;
}

#description{
    font-size: 15px;
    color: var(--text-muted);
    margin-bottom: 25px;
    line-height: 1.7;
}

#price{
    margin-bottom: 20px;
}

.product-buy input{
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
}

.buy-btn{
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #111, #333);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

.preview-row{
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.preview-row img{
    width: 80px;
    height: 60px;
    object-fit: cover;
    border-radius: 6px;
    cursor: pointer;
    opacity: 0.7;
}

.preview-row img:hover{
    opacity: 1;
}

@media(max-width:900px){
    .product-container{
        grid-template-columns: 1fr;
    }
}

</style>

</head>

<body>

<nav class="navbar">
    <div class="logo">MINDLENS</div>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
    </div>
</nav>

<div class="product-container">

    <div class="product-image">
        <img id="mainImage">
        <!-- ✅ FIXED ID -->
        <div id="previewRow" class="preview-row"></div>
    </div>

    <div class="product-info">

        <h1 id="title"></h1>
        <div id="description"></div>
        <div id="price"></div>

        <div class="product-buy">
            <input id="userPhone" placeholder="Enter Phone Number">
            <input id="userEmail" placeholder="Enter Email">
            <button id="buyBtn" class="buy-btn">Buy Now</button>
        </div>

    </div>

</div>
