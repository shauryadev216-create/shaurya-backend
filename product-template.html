<!DOCTYPE html>
<html>
<head>
<title>Product</title>
<link rel="stylesheet" href="public/css/Style.css">

<style>
.product-container{
    max-width: 1100px;
    margin: 60px auto;
    padding: 20px;
}

.product-image img{
    width: 100%;
    height: 500px;
    object-fit: cover;
    cursor: pointer;
}

.product-info{
    margin-top: 30px;
}

.product-buy{
    margin-top: 20px;
}

.buy-btn{
    margin-top: 15px;
    padding: 14px 24px;
    background:#111;
    color:#fff;
    border:none;
    cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    justify-content: center;
    align-items: center;
}

.lightbox img{
    max-width: 90%;
    max-height: 90%;
}

.lightbox.active{
    display: flex;
}

.buy-btn {
    padding: 14px 28px;
    background: linear-gradient(135deg, #111, #333);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
}

.buy-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

.buy-btn:active {
    transform: scale(0.97);
}

/* 💎 PREMIUM PRICE */
#price {
    font-size: 24px;
    font-weight: 700;
    color: #000;
    letter-spacing: 0.5px;
}
</style>

</head>

<body>

<div class="product-container">

    <div class="product-image">
        <img id="mainImage">
    </div>

    <div class="product-info">
       

        <div class="product-buy">
    <span id="price"></span><br>

    <input id="userPhone" placeholder="Enter Phone Number">
    <input id="userEmail" placeholder="Enter Email">

    <button id="buyBtn" class="buy-btn">Buy Now</button>
</div>
