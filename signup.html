<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg,#f5f7fb,#e8ecf4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.container{
    width:400px;
    background:#fff;
    padding:40px;
    border-radius:16px;
    box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

/* TITLE */
h1{
    margin:0;
    font-size:28px;
    font-weight:600;
}

p{
    color:#777;
    font-size:14px;
    margin-bottom:20px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:14px;
    transition:0.2s;
}

input:focus{
    border-color:#3b82f6;
    outline:none;
    box-shadow:0 0 0 3px rgba(59,130,246,0.1);
}

/* BUTTON */
button{
    width:100%;
    margin-top:20px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#111;
    color:#fff;
    font-weight:600;
    cursor:pointer;
    transition:0.25s;
}

button:hover{
    background:#333;
}

/* LOGIN LINK */
.bottom{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.bottom a{
    color:#3b82f6;
    text-decoration:none;
}

.bottom a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="container">

    <p>Create your account</p>
    <h1>Sign Up</h1>

    <input id="email" placeholder="Email address">
    <input id="password" type="password" placeholder="Password">

    <button onclick="signup()">Create Account</button>

    <div class="bottom">
        Already have an account?
        <a href="login.html">Login</a>
    </div>

</div>

<script type="module" src="signup.js"></script>

</body>
</html>
