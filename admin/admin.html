<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link rel="stylesheet" href="../public/css/Style.css">

<style>

body{
    background:#f7f7f7;
    font-family:'Inter', sans-serif;
}

.admin-container{
    max-width:850px;
    margin:50px auto;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.06);
}

.admin-container input,
.admin-container textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #e5e5e5;
    border-radius:8px;
    font-size:14px;
}

/* 🔥 MULTILINE SUPPORT */
.admin-container textarea{
    min-height:160px;
    resize:vertical;
}

/* DISCOUNT */
.discount-preview{
    font-size:14px;
    margin-bottom:15px;
}

/* BUTTON */
.btn-save{
    width:100%;
    padding:16px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

/* CLICK ANIMATION */
.btn-save:active,
.action-btn:active{
    transform:scale(0.95);
}

/* LIST */
.admin-list{
    max-width:850px;
    margin:30px auto;
}

.admin-card{
    background:#fff;
    padding:18px;
    border-radius:10px;
    border:1px solid #eee;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
}

.action-btn{
    padding:8px 12px;
    font-size:12px;
    border:none;
    cursor:pointer;
    border-radius:6px;
}

.edit-btn{ background:#eaeaea; }
.delete-btn{ background:#ff4d4d; color:#fff; }

</style>

</head>

<body>

<div class="admin-container">

<h2>Add Product</h2>

<input id="title" placeholder="Product Title">

<input id="originalPrice" placeholder="Original Price ($)">
<input id="price" placeholder="Discount Price ($)">

<div id="discountPreview" class="discount-preview"></div>

<textarea id="description" placeholder="Write description with ENTER for new lines..."></textarea>

<div class="type-box">
<label><input type="radio" name="type" value="photo" checked><span>Photo</span></label>
<label><input type="radio" name="type" value="pack"><span>Pack</span></label>
</div>

<div class="category-box">
<label><input type="checkbox" value="nature"><span>Nature</span></label>
<label><input type="checkbox" value="cinematic"><span>Cinematic</span></label>
<label><input type="checkbox" value="macro"><span>Macro</span></label>
<label><input type="checkbox" value="bw"><span>B&W</span></label>
<label><input type="checkbox" value="textures"><span>Textures</span></label>
<label><input type="checkbox" value="portrait"><span>Portrait</span></label>
<label><input type="checkbox" value="minimal"><span>Minimal</span></label>
<label><input type="checkbox" value="abstract"><span>Abstract</span></label>
</div>

<div class="field photo-field">
<p>Photo Cover</p>
<input type="file" id="photoCover">
</div>

<div class="field photo-field">
<p>Photo HD</p>
<input type="file" id="photoOriginal">
</div>

<div class="field pack-field">
<p>Pack Preview</p>
<input type="file" id="packPreview" multiple>
</div>

<div class="field pack-field">
<p>Pack ZIP</p>
<input type="file" id="packZip">
</div>

<button id="saveBtn" class="btn-save">Save Product</button>

</div>

<div class="admin-list">
<h3>Products</h3>
<div id="product-list-admin"></div>
</div>

<script src="admin.js"></script>

</body>
</html>
