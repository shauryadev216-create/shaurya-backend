<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<link rel="stylesheet" href="../public/css/Style.css">

<style>

body{
    background:#f7f7f7;
    font-family:'Inter', sans-serif;
}

.admin-container{
    max-width:900px;
    margin:50px auto;
    background:#fff;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 40px rgba(0,0,0,0.06);
}

.admin-container input,
.admin-container textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #e5e5e5;
    border-radius:8px;
    font-size:14px;
}

/* TYPE */
.type-box{
    display:flex;
    gap:10px;
    margin:20px 0;
}

.type-box label{
    flex:1;
    cursor:pointer;
}

.type-box span{
    display:block;
    text-align:center;
    padding:14px;
    border:1px solid #ddd;
    border-radius:10px;
}

.type-box input{ display:none; }

.type-box input:checked + span{
    background:#111;
    color:#fff;
}

/* CATEGORY */
.category-box{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:20px 0;
}

.category-box span{
    padding:8px 14px;
    border:1px solid #ddd;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
}

.category-box input{ display:none; }

.category-box input:checked + span{
    background:#111;
    color:#fff;
}

/* SECTION */
.section{
    border:1px solid #eee;
    padding:18px;
    border-radius:10px;
    margin-bottom:20px;
}

textarea{
    min-height:160px;
}

/* BUTTON */
.btn-save{
    width:100%;
    padding:16px;
    background:#111;
    color:#fff;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.btn-save:active{ transform:scale(0.95); }

/* DISCOUNT PREVIEW */
#discountPreview{
    font-weight:600;
    color:#ff4d4d;
    margin-bottom:15px;
}

</style>

</head>

<body>

<div class="admin-container">

<h2>Add Product</h2>

<input id="title" placeholder="Product Title">

<input id="originalPrice" placeholder="Original Price ($)">
<input id="price" placeholder="Discount Price ($)">

<div id="discountPreview"></div>

<textarea id="description" placeholder="Description"></textarea>

<!-- TYPE -->
<div class="type-box">
<label>
<input type="radio" name="type" value="photo" checked>
<span>📸 Photo</span>
</label>

<label>
<input type="radio" name="type" value="pack">
<span>📦 Pack</span>
</label>
</div>

<!-- CATEGORY -->
<div class="category-box">
<label><input type="checkbox" value="nature"><span>Nature</span></label>
<label><input type="checkbox" value="cinematic"><span>Cinematic</span></label>
<label><input type="checkbox" value="macro"><span>Macro</span></label>
<label><input type="checkbox" value="bw"><span>B&W</span></label>
<label><input type="checkbox" value="textures"><span>Textures</span></label>
<label><input type="checkbox" value="portrait"><span>Portrait</span></label>
<label><input type="checkbox" value="minimal"><span>Minimal</span></label>
<label><input type="checkbox" value="abstract"><span>Abstract</span></label>
</div>

<!-- PHOTO -->
<div class="section">
<h4>📸 Photo Upload</h4>
<input type="file" id="photoCover">
<input type="file" id="photoOriginal">
</div>

<!-- PACK -->
<div class="section">
<h4>📦 Pack Upload</h4>
<input type="file" id="packPreview" multiple>
<input type="file" id="packZip">
</div>

<button id="saveBtn" class="btn-save">Save Product</button>

</div>

<div class="admin-list">
<h3>Products</h3>
<div id="product-list-admin"></div>
</div>

<script src="admin.js"></script>

</body>
</html>
