<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>


<style>


/* ===== GLOBAL ===== */
body{
    background:#f7f7f7;
    font-family:'Inter', sans-serif;
    margin:0;
}

/* ===== MAIN CONTAINER ===== */
.admin-container{
    max-width:900px;
    margin:50px auto;
    background:#fff;
    padding:35px;
    border-radius:14px;
    box-shadow:0 15px 50px rgba(0,0,0,0.08);
}

/* ===== INPUTS ===== */
.admin-container input,
.admin-container textarea{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #e5e5e5;
    border-radius:10px;
    font-size:14px;
    transition:0.2s;
}

.admin-container input:focus,
.admin-container textarea:focus{
    border-color:#111;
    outline:none;
    box-shadow:0 0 0 3px rgba(0,0,0,0.05);
}

/* ===== TYPE TOGGLE ===== */
.type-box{
    display:flex;
    gap:12px;
    margin:20px 0;
}

.type-box label{
    flex:1;
    cursor:pointer;
}

.type-box span{
    display:block;
    text-align:center;
    padding:14px;
    border:1px solid #ddd;
    border-radius:12px;
    transition:0.2s;
    font-weight:500;
}

.type-box input{ display:none; }

.type-box input:checked + span{
    background:#111;
    color:#fff;
    border-color:#111;
}

/* ===== CATEGORY ===== */
.category-box{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin:20px 0;
}

.category-box label{
    cursor:pointer;
}

.category-box span{
    padding:8px 14px;
    border:1px solid #ddd;
    border-radius:20px;
    font-size:13px;
    transition:0.2s;
}

.category-box input{ display:none; }

.category-box input:checked + span{
    background:#111;
    color:#fff;
    border-color:#111;
}

/* ===== SECTION BOX ===== */
.section{
    border:1px solid #eee;
    padding:18px;
    border-radius:12px;
    margin-bottom:20px;
    background:#fafafa;
}

.section h4{
    margin-bottom:10px;
    font-size:14px;
    color:#666;
}

/* ===== TEXTAREA ===== */
textarea{
    min-height:160px;
    resize:vertical;
}

/* ===== DISCOUNT PREVIEW ===== */
#discountPreview{
    font-weight:600;
    color:#ff4d4d;
    margin-bottom:15px;
}

/* ===== SAVE BUTTON ===== */
.btn-save{
    width:100%;
    padding:16px;
    background:linear-gradient(135deg,#111,#333);
    color:#fff;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:15px;
    font-weight:600;
    transition:0.25s;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.btn-save:hover{
    transform:translateY(-2px);
}

.btn-save:active{
    transform:scale(0.95);
}

/* ===== ADMIN LIST ===== */
.admin-list{
    max-width:900px;
    margin:30px auto;
}

/* ===== PRODUCT CARD ===== */
.admin-card{
    background:#fff;
    padding:18px;
    border-radius:12px;
    border:1px solid #eee;
    margin-bottom:12px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s;
}

.admin-card:hover{
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* ===== BUTTONS ===== */
.action-btn{
    padding:8px 14px;
    font-size:12px;
    border:none;
    cursor:pointer;
    border-radius:8px;
    transition:0.2s;
}

.edit-btn{
    background:#eaeaea;
}

.edit-btn:hover{
    background:#dcdcdc;
}

.delete-btn{
    background:#ff4d4d;
    color:#fff;
}

.delete-btn:hover{
    background:#e63c3c;
}

.action-btn:active{
    transform:scale(0.9);
}

/* ===== PRICE STYLE ===== */
.admin-card s{
    color:#888;
    margin-right:6px;
}
</style>

</head>

<body>

<div class="admin-container">

<h2>Add Product</h2>

<input id="title" placeholder="Product Title">

<input id="originalPrice" placeholder="Original Price ($)">
<input id="price" placeholder="Discount Price ($)">

<div id="discountPreview"></div>

<textarea id="description" placeholder="Description"></textarea>

<!-- TYPE -->
<div class="type-box">
<label>
<input type="radio" name="type" value="photo" checked>
<span>📸 Photo</span>
</label>

<label>
<input type="radio" name="type" value="pack">
<span>📦 Pack</span>
</label>
</div>

<!-- CATEGORY -->
<div class="category-box">
<label><input type="checkbox" value="nature"><span>Nature</span></label>
<label><input type="checkbox" value="cinematic"><span>Cinematic</span></label>
<label><input type="checkbox" value="macro"><span>Macro</span></label>
<label><input type="checkbox" value="bw"><span>B&W</span></label>
<label><input type="checkbox" value="textures"><span>Textures</span></label>
<label><input type="checkbox" value="portrait"><span>Portrait</span></label>
<label><input type="checkbox" value="minimal"><span>Minimal</span></label>
<label><input type="checkbox" value="abstract"><span>Abstract</span></label>
</div>

<!-- PHOTO -->
<div class="section">
<h4>📸 Photo Upload</h4>
<input type="file" id="photoCover">
<input type="file" id="photoOriginal">
</div>

<!-- PACK -->
<div class="section">
<h4>📦 Pack Upload</h4>
<input type="file" id="packPreview" multiple>
<input type="file" id="packZip">
</div>

<button id="saveBtn" class="btn-save">Save Product</button>

</div>

<div class="admin-list">
<h3>Products</h3>
<div id="product-list-admin"></div>
</div>

<script src="admin.js"></script>

</body>
</html>
